name: Deploy frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install --no-frozen-lockfile --config.dangerously-allow-all-builds=true

      - name: Build static frontend
        env:
          NEXT_PUBLIC_API_BASE: https://api.simpletracker.ru
        run: pnpm run build:pages

      - name: Pack artifact
        run: tar -czf simpletracker-frontend.tar.gz -C out .

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /var/www/simpletracker/releases"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" simpletracker-frontend.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/simpletracker-frontend-${GITHUB_SHA}.tar.gz"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "GITHUB_SHA=$GITHUB_SHA bash -s" <<'SSH'
            set -euo pipefail
            if [ -d /srv/taskgantt/.git ]; then
              cd /srv/taskgantt
              git fetch origin main
              git reset --hard origin/main
            fi
            release="/var/www/simpletracker/releases/${GITHUB_SHA}"
            mkdir -p "$release"
            tar -xzf "/tmp/simpletracker-frontend-${GITHUB_SHA}.tar.gz" -C "$release"
            ln -sfn "$release" /var/www/simpletracker/current
            rm -f "/tmp/simpletracker-frontend-${GITHUB_SHA}.tar.gz"
            nginx -t
            systemctl reload nginx
          SSH
